<!doctype html>
<html lang="zh-Hant">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>電子發票</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      :root {
        --accent: #6366f1;
        --accent-dark: #4f46e5;
        --bg: #f8f8f8;
        --card: #ffffff;
        --text: #111827;
        --text-secondary: #6b7280;
        --border: #e5e7eb;
        --red: #ef4444;
        --green: #10b981;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
      }

      .tabular { font-variant-numeric: tabular-nums; }

      button, select, input {
        font-family: inherit;
      }

      .icon { width: 18px; height: 18px; flex-shrink: 0; }

      #app {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 220px;
        flex-shrink: 0;
        background: var(--card);
        border-right: 1px solid var(--border);
        padding: 24px 12px;
        display: none;
        flex-direction: column;
        gap: 4px;
      }

      .sidebar-title {
        font-size: 18px;
        font-weight: 700;
        padding: 0 12px 20px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        user-select: none;
      }

      .nav-item:hover { background: var(--bg); }

      .nav-item.active {
        background: rgba(99, 102, 241, 0.1);
        color: var(--accent);
      }

      .main {
        flex: 1;
        min-width: 0;
        padding: 20px 16px 88px;
        max-width: 880px;
        margin: 0 auto;
        width: 100%;
      }

      .page { display: none; opacity: 0; transform: translateY(6px); transition: opacity 0.2s ease, transform 0.2s ease; }
      .page.active { display: block; opacity: 1; transform: translateY(0); }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .header h1 { font-size: 20px; margin: 0 0 2px; }
      .header .sub { color: var(--text-secondary); font-size: 13px; }

      .btn {
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn:hover { background: var(--bg); }
      .btn:disabled { opacity: 0.6; cursor: wait; }

      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .btn-primary:hover { background: var(--accent-dark); }

      .btn-block { width: 100%; justify-content: center; padding: 12px; font-size: 14px; }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }

      .card-title {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 12px;
      }

      .hero-amount { font-size: 36px; font-weight: 800; line-height: 1.1; }

      .hero-delta {
        font-size: 13px;
        font-weight: 600;
        margin-top: 4px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .hero-delta.up { color: var(--red); }
      .hero-delta.down { color: var(--green); }

      .pills {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 16px;
      }

      .pill {
        background: var(--bg);
        border-radius: 8px;
        padding: 10px;
        text-align: center;
      }
      .pill .pill-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
      .pill .pill-value { font-size: 15px; font-weight: 700; }

      .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      .bar-emoji { font-size: 16px; width: 22px; text-align: center; }
      .bar-label { width: 64px; flex-shrink: 0; font-size: 13px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .bar-track { flex: 1; height: 22px; background: var(--bg); border-radius: 6px; overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; }
      .bar-amount { width: 78px; text-align: right; font-size: 13px; font-weight: 600; flex-shrink: 0; }

      .invoice-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .invoice-row:last-child { border-bottom: none; }

      .cat-badge {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        flex-shrink: 0;
      }

      .invoice-main { flex: 1; min-width: 0; }
      .invoice-seller {
        font-weight: 600;
        font-size: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 220px;
        display: inline-block;
        vertical-align: bottom;
      }

      .subcat-pill {
        display: inline-block;
        font-size: 11px;
        color: var(--text-secondary);
        background: var(--bg);
        border-radius: 999px;
        padding: 1px 8px;
        margin-left: 6px;
      }

      .invoice-time { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
      .invoice-right { text-align: right; flex-shrink: 0; }
      .invoice-amount { font-weight: 700; font-size: 14px; }
      .invoice-date { font-size: 12px; color: var(--text-secondary); }

      .invoice-detail {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.25s ease;
      }
      .invoice-detail.open { max-height: 600px; }
      .invoice-detail-inner { padding: 12px 0 14px; }

      .items-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 12px; }
      .items-table th, .items-table td { padding: 6px 4px; text-align: left; border-bottom: 1px solid var(--border); }
      .items-table th { color: var(--text-secondary); font-weight: 600; font-size: 11px; }
      .items-table td.num, .items-table th.num { text-align: right; }

      .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
      .field-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; display: block; }
      select.field, input.field {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        background: #fff;
      }

      .save-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
      .save-feedback { font-size: 12px; font-weight: 600; }
      .save-feedback.ok { color: var(--green); }
      .save-feedback.error { color: var(--red); }

      .sticky-bar {
        position: sticky;
        top: 0;
        background: var(--bg);
        padding-bottom: 10px;
        z-index: 5;
      }

      .month-switch {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .month-switch button {
        border: none;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .month-switch .month-label { font-weight: 700; font-size: 15px; min-width: 110px; text-align: center; }

      .search-export-row { display: flex; gap: 8px; margin-bottom: 10px; }
      .search-export-row input { flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }

      .sort-row {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 10px;
      }
      .sort-control {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 600;
      }
      .sort-control select {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        padding: 8px 28px 8px 10px;
      }

      .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 6px; }
      .chip {
        flex-shrink: 0;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        background: var(--card);
        color: var(--text);
        white-space: nowrap;
      }
      .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

      .toggle-group { display: flex; gap: 8px; margin-bottom: 12px; }
      .toggle-group .chip { flex: 1; text-align: center; }

      .date-group-header {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        font-weight: 700;
        color: var(--text-secondary);
        padding: 14px 0 6px;
      }

      .empty-state { text-align: center; padding: 60px 16px; color: var(--text-secondary); }
      .empty-state .icon { width: 40px; height: 40px; margin: 0 auto 12px; }

      .insight-report { white-space: pre-wrap; font-size: 13px; line-height: 1.7; color: var(--text); margin: 0; }
      .insight-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
      @media (min-width: 600px) { .insight-grid { grid-template-columns: 1fr 1fr; } }
      .insight-card {
        border-radius: 10px;
        padding: 12px 14px;
        border-left: 3px solid var(--border);
        background: var(--bg);
      }
      .insight-card .insight-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; margin-bottom: 4px; }
      .insight-card .insight-content { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
      .insight-card.tag-warning { border-left-color: var(--red); }
      .insight-card.tag-tip { border-left-color: var(--accent); }
      .insight-card.tag-good { border-left-color: var(--green); }
      .insight-card.tag-info { border-left-color: #9ca3af; }
      .insight-section-empty { font-size: 12px; color: var(--text-secondary); padding: 4px 0; }
      .insight-view-all { font-size: 12px; font-weight: 600; color: var(--accent); cursor: pointer; }

      .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .summary-table td { padding: 10px 4px; border-bottom: 1px solid var(--border); }
      .summary-table td.num { text-align: right; }
      .main-row { font-weight: 700; cursor: pointer; }
      .main-row td:first-child { border-left: 3px solid; padding-left: 8px; }
      .sub-row td:first-child { padding-left: 28px; color: var(--text-secondary); }
      .total-row { font-weight: 800; }

      .section-title { font-size: 15px; font-weight: 700; margin: 0 0 12px; }

      .sync-history-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        color: var(--text-secondary);
      }
      .sync-history-row:last-child { border-bottom: none; }

      .result-banner { border-radius: 8px; padding: 10px 12px; font-size: 13px; font-weight: 600; margin-top: 10px; }
      .result-banner.success { background: #ecfdf5; color: #059669; }
      .result-banner.neutral { background: var(--bg); color: var(--text-secondary); }
      .result-banner.error { background: #fef2f2; color: var(--red); }

      .app-info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; color: var(--text-secondary); }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--card);
        border-top: 1px solid var(--border);
        display: flex;
        z-index: 10;
      }
      .bottom-nav .nav-item {
        flex: 1;
        flex-direction: column;
        gap: 2px;
        font-size: 11px;
        border-radius: 0;
        padding: 8px 0 10px;
        align-items: center;
      }

      @media (min-width: 768px) {
        .sidebar { display: flex; }
        .bottom-nav { display: none; }
        .main { padding: 32px 32px 32px; max-width: 760px; }
        .pills { grid-template-columns: repeat(3, 1fr); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <nav class="sidebar" id="sidebarNav"></nav>

      <main class="main">
        <section class="page" id="page-home"></section>
        <section class="page" id="page-invoices"></section>
        <section class="page" id="page-summary"></section>
        <section class="page" id="page-insights"></section>
        <section class="page" id="page-prompts"></section>
        <section class="page" id="page-settings"></section>
      </main>
    </div>

    <nav class="bottom-nav" id="bottomNav"></nav>

    <script>
      window.__DATA__ = <?!= JSON.stringify(getPageData()) ?>;
    </script>

    <script>
      const CATEGORY_META = {
        "餐飲": { emoji: "🍽️", bg: "#FEE2E2", fg: "#EF4444" },
        "食品雜貨": { emoji: "🛒", bg: "#FEF3C7", fg: "#F59E0B" },
        "交通": { emoji: "🚗", bg: "#DBEAFE", fg: "#3B82F6" },
        "購物": { emoji: "🛍️", bg: "#FCE7F3", fg: "#EC4899" },
        "居家": { emoji: "🏠", bg: "#D1FAE5", fg: "#10B981" },
        "水電電信": { emoji: "📱", bg: "#E0E7FF", fg: "#6366F1" },
        "健康": { emoji: "💊", bg: "#FDF4FF", fg: "#A855F7" },
        "娛樂": { emoji: "🎬", bg: "#FFE4E6", fg: "#F43F5E" },
        "旅行": { emoji: "✈️", bg: "#CFFAFE", fg: "#06B6D4" },
        "教育": { emoji: "📚", bg: "#ECFDF5", fg: "#059669" },
        "工作": { emoji: "💼", bg: "#F0FDF4", fg: "#22C55E" },
        "其他": { emoji: "📦", bg: "#F3F4F6", fg: "#6B7280" },
      };

      const NAV_ITEMS = [
        { key: "home", label: "首頁", icon: "home" },
        { key: "invoices", label: "發票", icon: "receipt" },
        { key: "summary", label: "彙總", icon: "pie-chart" },
        { key: "insights", label: "AI洞察", icon: "lightbulb" },
        { key: "prompts", label: "AI範本", icon: "sparkles" },
        { key: "settings", label: "設定", icon: "settings" },
      ];

      const DATA = window.__DATA__;

      const state = {
        tab: "home",
        invoicesMonth: DATA.currentMonth,
        invoicesQuery: "",
        invoicesCategory: "全部",
        invoicesSort: "date-desc",
        invoicesExpanded: {},
        summaryMonth: DATA.currentMonth,
        summaryExpanded: {},
        insightsMonth: DATA.currentMonth,
        refreshing: false,
        syncing: false,
        syncResult: null,
        exporting: false,
        exportError: "",
        exportFormat: "csv",
      };

      const charts = {};

      function catMeta(category) {
        return CATEGORY_META[category] || CATEGORY_META["其他"];
      }

      function formatCurrency(value) {
        return "NT$" + Math.round(value || 0).toLocaleString("en-US");
      }

      function monthLabel(monthKey) {
        const [y, m] = String(monthKey).split("-");
        return y + "年" + Number(m) + "月";
      }

      function shiftMonth(monthKey, delta) {
        const [y, m] = String(monthKey).split("-").map(Number);
        const date = new Date(y, m - 1 + delta, 1);
        return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
      }

      function weekdayLabel(dateStr) {
        const names = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
        const date = new Date(dateStr + "T00:00:00");
        if (Number.isNaN(date.getTime())) return "";
        return Number(dateStr.slice(5, 7)) + "月" + Number(dateStr.slice(8, 10)) + "日 " + names[date.getDay()];
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderNav() {
        const navHtml = NAV_ITEMS.map(function (item) {
          return (
            '<div class="nav-item' + (state.tab === item.key ? " active" : "") + '" data-tab="' + item.key + '">' +
              '<i data-lucide="' + item.icon + '" class="icon"></i><span>' + item.label + "</span>" +
            "</div>"
          );
        }).join("");

        document.getElementById("sidebarNav").innerHTML =
          '<div class="sidebar-title">電子發票</div>' + navHtml;
        document.getElementById("bottomNav").innerHTML = navHtml;

        document.querySelectorAll("[data-tab]").forEach(function (el) {
          el.addEventListener("click", function () {
            state.tab = el.getAttribute("data-tab");
            render();
          });
        });
      }

      function switchPage() {
        document.querySelectorAll(".page").forEach(function (page) { page.classList.remove("active"); });
        document.getElementById("page-" + state.tab).classList.add("active");
      }

      function render() {
        renderNav();
        switchPage();
        renderHome();
        renderInvoices();
        renderSummary();
        renderInsights();
        renderPrompts();
        renderSettings();
        if (window.lucide) lucide.createIcons();
      }

      // ---------- 首頁 ----------

      function renderHome() {
        const summary = DATA.summary;
        const deltaUp = summary.vsLastMonth >= 0;
        const top5 = summary.byCategory.slice(0, 5);
        const recent = DATA.invoices.slice(0, 8);

        const html =
          '<div class="header">' +
            '<div><h1>電子發票</h1><div class="sub">' + monthLabel(DATA.currentMonth) + "</div></div>" +
            '<div style="display:flex;gap:6px">' +
              '<button class="btn" id="refreshDataBtn" ' + (state.refreshing ? "disabled" : "") + '><i data-lucide="rotate-cw" class="icon" style="width:14px;height:14px"></i>' + (state.refreshing ? "重新整理中..." : "重新整理") + "</button>" +
              '<button class="btn" id="syncShortcut"><i data-lucide="refresh-cw" class="icon" style="width:14px;height:14px"></i>同步發票</button>' +
            "</div>" +
          "</div>" +

          '<div class="card">' +
            '<div class="hero-amount tabular">' + formatCurrency(summary.totalAmount) + "</div>" +
            '<div class="hero-delta ' + (deltaUp ? "up" : "down") + '">' +
              (deltaUp ? "▲" : "▼") + " " + Math.abs(summary.vsLastMonth) + "% 較上月 " + formatCurrency(Math.abs(summary.vsLastMonthAmount)) +
            "</div>" +
            '<div class="pills">' +
              pillHtml("筆數", summary.invoiceCount) +
              pillHtml("日均", formatCurrency(summary.dailyAverage)) +
              pillHtml("最高", formatCurrency(summary.maxSingle)) +
            "</div>" +
          "</div>" +

          insightSummaryHtml(DATA.currentMonth) +

          '<div class="card"><h3 class="card-title">本月前 5 大類別</h3>' + topCategoriesHtml(top5) + "</div>" +

          '<div class="card"><h3 class="card-title">近 6 個月趨勢</h3><canvas id="trendChart" height="180"></canvas></div>' +

          '<div class="card"><h3 class="card-title">最近發票</h3>' + recentInvoicesHtml(recent) + "</div>";

        document.getElementById("page-home").innerHTML = html;
        bindInsightSummaryEvents(document.getElementById("page-home"));

        const syncShortcut = document.getElementById("syncShortcut");
        if (syncShortcut) syncShortcut.addEventListener("click", function () {
          state.tab = "settings";
          render();
        });

        const refreshDataBtn = document.getElementById("refreshDataBtn");
        if (refreshDataBtn) refreshDataBtn.addEventListener("click", function () {
          state.refreshing = true;
          renderHome();
          google.script.run
            .withSuccessHandler(function (data) {
              state.refreshing = false;
              Object.assign(DATA, data);
              render();
            })
            .withFailureHandler(function (error) {
              state.refreshing = false;
              renderHome();
              console.error(error);
            })
            .getPageData();
        });

        bindRecentInvoiceToggles();
        renderTrendChart();
        if (window.lucide) lucide.createIcons();
      }

      function pillHtml(label, value) {
        return '<div class="pill"><div class="pill-label">' + label + '</div><div class="pill-value tabular">' + value + "</div></div>";
      }

      function topCategoriesHtml(categories) {
        if (!categories.length) return '<div class="empty-state">尚無資料</div>';
        const max = Math.max.apply(null, categories.map(function (c) { return c.amount; }));
        return categories.map(function (c) {
          const meta = catMeta(c.category);
          const widthPct = max ? Math.max(6, Math.round((c.amount / max) * 100)) : 0;
          return (
            '<div class="bar-row">' +
              '<div class="bar-emoji">' + meta.emoji + "</div>" +
              '<div class="bar-label">' + escapeHtml(c.category) + "</div>" +
              '<div class="bar-track"><div class="bar-fill" style="width:' + widthPct + '%;background:' + meta.fg + '"></div></div>' +
              '<div class="bar-amount tabular">' + formatCurrency(c.amount) + "</div>" +
            "</div>"
          );
        }).join("");
      }

      function recentInvoicesHtml(invoices) {
        if (!invoices.length) return '<div class="empty-state">尚無發票</div>';
        return invoices.map(function (invoice) { return invoiceRowHtml(invoice, "recent"); }).join("");
      }

      function invoiceRowHtml(invoice, scope) {
        const meta = catMeta(invoice.mainCategory);
        const key = scope === "recent" ? "recent:" + invoice.id : invoice.id;
        const expanded = Boolean(state.invoicesExpanded[key]);

      // ---------- 發票列表 ----------

      function filteredInvoices() {
        const month = state.invoicesMonth;
        const query = state.invoicesQuery.trim().toLowerCase();
        const category = state.invoicesCategory;
        return sortInvoices(DATA.invoices.filter(function (invoice) {
          if (invoice.date.slice(0, 7) !== month) return false;
          if (category !== "全部" && invoice.mainCategory !== category) return false;
          if (query && invoice.seller.toLowerCase().indexOf(query) === -1 &&
              !(invoice.items || []).some(function (item) { return String(item.name || "").toLowerCase().indexOf(query) !== -1; })) {
            return false;
          }
          return true;
        }));
      }

      function invoiceDateTimeValue(invoice) {
        const date = new Date((invoice.date || "") + "T" + (invoice.time || "00:00") + ":00");
        return Number.isNaN(date.getTime()) ? 0 : date.getTime();
      }

      function sortInvoices(invoices) {
        const sorted = invoices.slice();
        sorted.sort(function (a, b) {
          if (state.invoicesSort === "amount-desc") {
            return (b.amount || 0) - (a.amount || 0) || invoiceDateTimeValue(b) - invoiceDateTimeValue(a);
          }
          if (state.invoicesSort === "amount-asc") {
            return (a.amount || 0) - (b.amount || 0) || invoiceDateTimeValue(b) - invoiceDateTimeValue(a);
          }
          if (state.invoicesSort === "date-asc") {
            return invoiceDateTimeValue(a) - invoiceDateTimeValue(b);
          }
          return invoiceDateTimeValue(b) - invoiceDateTimeValue(a);
        });
        return sorted;
      }

      function renderInvoices() {
        const invoices = filteredInvoices();
        const categoryNames = Object.keys(DATA.categories);

        const chipsHtml = ["全部"].concat(categoryNames).map(function (name) {
          return '<div class="chip' + (state.invoicesCategory === name ? " active" : "") + '" data-chip="' + escapeHtml(name) + '">' + escapeHtml(name) + "</div>";
        }).join("");

        const sortOptionsHtml = [
          { value: "date-desc", label: "日期新到舊" },
          { value: "date-asc", label: "日期舊到新" },
          { value: "amount-desc", label: "金額高到低" },
          { value: "amount-asc", label: "金額低到高" },
        ].map(function (option) {
          return '<option value="' + option.value + '"' + (state.invoicesSort === option.value ? " selected" : "") + ">" + option.label + "</option>";
        }).join("");

        const listHtml = invoices.length
          ? invoicesListHtml(invoices)

        const html =
          '<div class="sticky-bar">' +
            '<div class="header" style="margin-bottom:8px"><h1>發票</h1>' +
              '<div style="display:flex;gap:6px"><button class="btn" id="exportCsvBtn">CSV</button><button class="btn" id="exportJsonBtn">JSON</button></div>' +
            "</div>" +
            '<div class="month-switch">' +
              '<button data-month-delta="-1"><i data-lucide="chevron-left" class="icon"></i></button>' +
              '<span class="month-label">' + monthLabel(state.invoicesMonth) + "</span>" +
              '<button data-month-delta="1"><i data-lucide="chevron-right" class="icon"></i></button>' +
            "</div>" +
            '<div class="search-export-row"><input type="text" id="invoiceSearch" placeholder="搜尋店家或品項..." value="' + escapeHtml(state.invoicesQuery) + '" /></div>' +
            '<div class="sort-row"><label class="sort-control" for="invoiceSort"><i data-lucide="arrow-up-down" class="icon" style="width:14px;height:14px"></i>排序<select id="invoiceSort">' + sortOptionsHtml + "</select></label></div>" +
            '<div class="chips">' + chipsHtml + "</div>" +
          "</div>" +
          '<div class="card" style="padding:0 16px">' + listHtml + "</div>";

        document.getElementById("page-invoices").innerHTML = html;
        bindInvoicesPageEvents();
        if (window.lucide) lucide.createIcons();
      }

      function invoicesListHtml(invoices) {
        if (state.invoicesSort.indexOf("amount-") === 0) {
          return invoices.map(function (inv) { return invoiceRowHtml(inv, "list"); }).join("");
        }
        const groups = groupByDate(invoices);
        return groups.map(function (group) {
          const dayTotal = group.invoices.reduce(function (sum, inv) { return sum + inv.amount; }, 0);
          return (
            '<div class="date-group-header"><span>' + weekdayLabel(group.date) + "</span><span class=\"tabular\">" + formatCurrency(dayTotal) + "</span></div>" +
            group.invoices.map(function (inv) { return invoiceRowHtml(inv, "list"); }).join("")
          );
        }).join("");
      }

      function groupByDate(invoices) {
        const map = {};
        const order = [];
        invoices.forEach(function (invoice) {
          if (!map[invoice.date]) { map[invoice.date] = []; order.push(invoice.date); }
          map[invoice.date].push(invoice);
        });
        return order.map(function (date) { return { date: date, invoices: map[date] }; });
      }

      function bindInvoicesPageEvents() {
        document.querySelectorAll('#page-invoices [data-month-delta]').forEach(function (el) {
          el.addEventListener("click", function () {
            state.invoicesMonth = shiftMonth(state.invoicesMonth, Number(el.getAttribute("data-month-delta")));
            renderInvoices();
          });
        });

        document.querySelectorAll('#page-invoices [data-chip]').forEach(function (el) {
          el.addEventListener("click", function () {
            state.invoicesCategory = el.getAttribute("data-chip");
            renderInvoices();
          });
        });

        const search = document.getElementById("invoiceSearch");
        if (search) {
          search.addEventListener("compositionstart", function () {
            search.dataset.composing = "1";
          });
          search.addEventListener("compositionend", function () {
            search.dataset.composing = "";
            search.dispatchEvent(new Event("input"));
          });
          search.addEventListener("input", function () {
            if (search.dataset.composing) return;
            state.invoicesQuery = search.value;
            const caret = search.selectionStart;
            renderInvoices();
            const restored = document.getElementById("invoiceSearch");
            if (restored) {
              restored.focus();
              restored.setSelectionRange(caret, caret);
            }
          });
        }

        const sort = document.getElementById("invoiceSort");
        if (sort) {
          sort.addEventListener("change", function () {
            state.invoicesSort = sort.value;
            renderInvoices();
          });
        }

        document.querySelectorAll('#page-invoices [data-toggle]').forEach(function (el) {
          el.addEventListener("click", function () {
            const id = el.getAttribute("data-toggle");
            state.invoicesExpanded[id] = !state.invoicesExpanded[id];
            renderInvoices();
          });
        });

        const csvBtn = document.getElementById("exportCsvBtn");
        const jsonBtn = document.getElementById("exportJsonBtn");
        if (csvBtn) csvBtn.addEventListener("click", function () { triggerExport(state.invoicesMonth, state.invoicesMonth, "csv"); });
        if (jsonBtn) jsonBtn.addEventListener("click", function () { triggerExport(state.invoicesMonth, state.invoicesMonth, "json"); });

      function editFormHtml(invoice) {
        const mainOptions = Object.keys(DATA.categories).map(function (name) {
          return '<option value="' + escapeHtml(name) + '"' + (name === invoice.mainCategory ? " selected" : "") + ">" + escapeHtml(name) + "</option>";
        }).join("");
        const subList = DATA.categories[invoice.mainCategory] || [];
        const subOptions = subList.map(function (name) {
          return '<option value="' + escapeHtml(name) + '"' + (name === invoice.subcategory ? " selected" : "") + ">" + escapeHtml(name) + "</option>";
        }).join("");

        return (
          '<div style="border-top:1px solid var(--border);padding-top:10px">' +
            '<div class="edit-grid">' +
              '<div><span class="field-label">分類</span><select class="field" data-edit-main="' + invoice.id + '">' + mainOptions + "</select></div>" +
              '<div><span class="field-label">子分類</span><select class="field" data-edit-sub="' + invoice.id + '">' + subOptions + "</select></div>" +
            "</div>" +
            '<span class="field-label">備註</span>' +
            '<input class="field" type="text" data-edit-note="' + invoice.id + '" value="' + escapeHtml(invoice.note || "") + '" />' +
            '<div class="save-row">' +
              '<button class="btn btn-primary" data-save="' + invoice.id + '">儲存</button>' +
              '<span class="save-feedback" data-feedback="' + invoice.id + '"></span>' +
            "</div>" +
          "</div>"
        );
      }

      document.addEventListener("change", function (event) {
        const mainSelect = event.target.closest("[data-edit-main]");
        if (mainSelect) {
          const id = mainSelect.getAttribute("data-edit-main");
          const invoice = DATA.invoices.find(function (inv) { return inv.id === id; });
          if (invoice) invoice.mainCategory = mainSelect.value;
          const subSelect = document.querySelector('[data-edit-sub="' + id + '"]');
          if (subSelect) {
            const subList = DATA.categories[mainSelect.value] || [];
            subSelect.innerHTML = subList.map(function (name) {
              return '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + "</option>";
            }).join("");
          }
        }
      });

      document.addEventListener("click", function (event) {
        const saveBtn = event.target.closest("[data-save]");
        if (!saveBtn) return;
        const id = saveBtn.getAttribute("data-save");
        const mainSelect = document.querySelector('[data-edit-main="' + id + '"]');
        const subSelect = document.querySelector('[data-edit-sub="' + id + '"]');
        const noteInput = document.querySelector('[data-edit-note="' + id + '"]');
        const feedback = document.querySelector('[data-feedback="' + id + '"]');
        const payload = {
          id: id,
          mainCategory: mainSelect ? mainSelect.value : "",
          subcategory: subSelect ? subSelect.value : "",
          note: noteInput ? noteInput.value : "",
        };

        saveBtn.disabled = true;
        google.script.run
          .withSuccessHandler(function () {
            const invoice = DATA.invoices.find(function (inv) { return inv.id === id; });
            if (invoice) {
              invoice.mainCategory = payload.mainCategory;
              invoice.subcategory = payload.subcategory;
              invoice.note = payload.note;
            }
            saveBtn.disabled = false;
            if (feedback) {
              feedback.textContent = "✓ 已儲存";
              feedback.className = "save-feedback ok";
              setTimeout(function () { feedback.textContent = ""; feedback.className = "save-feedback"; }, 2000);
            }
          })
          .withFailureHandler(function (error) {
            saveBtn.disabled = false;
            if (feedback) {
              feedback.textContent = error.message || String(error);
              feedback.className = "save-feedback error";
            }
          })
          .updateInvoice(payload);
      });

      function triggerExport(startMonth, endMonth, format) {
        google.script.run
          .withSuccessHandler(function (result) {
            const mime = format === "json" ? "application/json" : "text/csv";
            const blob = new Blob([result.data], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = result.filename;
            a.click();
            URL.revokeObjectURL(url);
          })
          .withFailureHandler(function (error) {
            console.error(error);
          })
          .exportData({ startMonth: startMonth, endMonth: endMonth, format: format });
      }

      // ---------- 月份彙總 ----------

      function getByCategoryForMonth(month) {
        return month === DATA.currentMonth ? DATA.summary.byCategory : computeByCategoryForMonth(month);
      }

      function renderSummary() {
        const month = state.summaryMonth;
        const byCategory = getByCategoryForMonth(month);
        const total = byCategory.reduce(function (sum, c) { return sum + c.amount; }, 0);

        const lastMonth = shiftMonth(month, -1);
        const lastByCategory = getByCategoryForMonth(lastMonth);
        const lastTotal = lastByCategory.reduce(function (sum, c) { return sum + c.amount; }, 0);
        const lastAmountByCategory = {};
        lastByCategory.forEach(function (c) { lastAmountByCategory[c.category] = c.amount; });

        const totalDeltaPct = lastTotal ? Math.round(((total - lastTotal) / lastTotal) * 1000) / 10 : (total ? 100 : 0);
        const totalDeltaUp = total - lastTotal >= 0;
        const totalCompareHtml =
          '<div class="hero-delta ' + (totalDeltaUp ? "up" : "down") + '">' +
            (totalDeltaUp ? "▲" : "▼") + " " + Math.abs(totalDeltaPct) + "% 較上月（" + monthLabel(lastMonth) + " " + formatCurrency(lastTotal) + "）" +
          "</div>";

        const html =
          '<div class="header"><h1>彙總</h1></div>' +
          '<div class="month-switch">' +
            '<button data-summary-delta="-1"><i data-lucide="chevron-left" class="icon"></i></button>' +
            '<span class="month-label">' + monthLabel(month) + "</span>" +
            '<button data-summary-delta="1"><i data-lucide="chevron-right" class="icon"></i></button>' +
          "</div>" +
          '<div class="card">' +
            '<div class="hero-amount tabular">' + formatCurrency(total) + "</div>" +
            totalCompareHtml +
          "</div>" +
          '<div class="card"><h3 class="card-title">類別支出（橫向比較）</h3><canvas id="categoryBarChart" height="' + Math.max(160, byCategory.length * 40) + '"></canvas></div>' +
          '<div class="card"><table class="summary-table">' + summaryRowsHtml(byCategory, total, lastAmountByCategory) + "</table></div>";

        document.getElementById("page-summary").innerHTML = html;
        bindSummaryEvents();
        renderCategoryBarChart(byCategory, lastAmountByCategory);
        if (window.lucide) lucide.createIcons();
      }

      function computeByCategoryForMonth(month) {
        const invoices = DATA.invoices.filter(function (inv) { return inv.date.slice(0, 7) === month; });
        const byMain = {};
        invoices.forEach(function (inv) {
          if (!byMain[inv.mainCategory]) byMain[inv.mainCategory] = { amount: 0, count: 0, subcategories: {} };
          const bucket = byMain[inv.mainCategory];
          bucket.amount += inv.amount;
          bucket.count += 1;
          if (!bucket.subcategories[inv.subcategory]) bucket.subcategories[inv.subcategory] = { amount: 0, count: 0 };
          bucket.subcategories[inv.subcategory].amount += inv.amount;
          bucket.subcategories[inv.subcategory].count += 1;
        });
        const total = invoices.reduce(function (sum, inv) { return sum + inv.amount; }, 0);
        return Object.keys(byMain).map(function (category) {
          const bucket = byMain[category];
          return {
            category: category,
            amount: bucket.amount,
            count: bucket.count,
            pct: total ? Math.round((bucket.amount / total) * 1000) / 10 : 0,
            subcategories: Object.keys(bucket.subcategories).map(function (sub) {
              const s = bucket.subcategories[sub];
              return { subcategory: sub, amount: s.amount, count: s.count, pct: total ? Math.round((s.amount / total) * 1000) / 10 : 0 };
            }).sort(function (a, b) { return b.amount - a.amount; }),
          };
        }).sort(function (a, b) { return b.amount - a.amount; });
      }

      function categoryDeltaHtml(amount, lastAmount) {
        if (!lastAmount) {
          return amount ? '<span style="color:var(--text-secondary)">新增</span>' : "—";
        }
        const pct = Math.round(((amount - lastAmount) / lastAmount) * 1000) / 10;
        const up = amount - lastAmount >= 0;
        return '<span style="color:' + (up ? "var(--red)" : "var(--green)") + '">' + (up ? "▲" : "▼") + " " + Math.abs(pct) + "%</span>";
      }

      function summaryRowsHtml(byCategory, total, lastAmountByCategory) {
        lastAmountByCategory = lastAmountByCategory || {};
        if (!byCategory.length) return '<tr><td colspan="5" class="empty-state">本月尚無支出</td></tr>';
        const totalCount = byCategory.reduce(function (sum, c) { return sum + c.count; }, 0);
        const rows = byCategory.map(function (c) {
          const meta = catMeta(c.category);
          const expanded = Boolean(state.summaryExpanded[c.category]);
          const mainRow =
            '<tr class="main-row" data-summary-toggle="' + escapeHtml(c.category) + '" style="border-left-color:' + meta.fg + '">' +
              "<td>" + meta.emoji + " " + escapeHtml(c.category) + "</td>" +
              '<td class="num tabular">' + formatCurrency(c.amount) + "</td>" +
              '<td class="num tabular">' + c.count + "</td>" +
              '<td class="num tabular">' + c.pct + "%</td>" +
              '<td class="num tabular">' + categoryDeltaHtml(c.amount, lastAmountByCategory[c.category]) + "</td>" +
            "</tr>";
          const subRows = expanded ? c.subcategories.map(function (s) {
            return (
              '<tr class="sub-row"><td>' + escapeHtml(s.subcategory) + "</td>" +
              '<td class="num tabular">' + formatCurrency(s.amount) + "</td>" +
              '<td class="num tabular">' + s.count + "</td>" +
              '<td class="num tabular">' + s.pct + "%</td>" +
              '<td class="num"></td></tr>'
            );
          }).join("") : "";
          return mainRow + subRows;
        }).join("");

        return rows + '<tr class="total-row"><td>總計</td><td class="num tabular">' + formatCurrency(total) + '</td><td class="num tabular">' + totalCount + '</td><td class="num">100%</td><td class="num"></td></tr>';
      }

      function bindSummaryEvents() {
        document.querySelectorAll('#page-summary [data-summary-delta]').forEach(function (el) {
          el.addEventListener("click", function () {
            state.summaryMonth = shiftMonth(state.summaryMonth, Number(el.getAttribute("data-summary-delta")));
            renderSummary();
          });
        });
        document.querySelectorAll('#page-summary [data-summary-toggle]').forEach(function (el) {

            const key = el.getAttribute("data-summary-toggle");
            state.summaryExpanded[key] = !state.summaryExpanded[key];
            renderSummary();
          });
        });

      // ---------- AI 洞察 ----------

      const INSIGHT_TAG_META = {
        warning: { icon: "alert-triangle" },
        tip: { icon: "lightbulb" },
        good: { icon: "check-circle" },
        info: { icon: "info" },
      };

      function insightsForMonth(month) {
        return (DATA.insights || []).filter(function (insight) { return insight.month === month; });
      }

      function insightCardHtml(insight) {
        const tag = INSIGHT_TAG_META[insight.tag] ? insight.tag : "info";
        const icon = INSIGHT_TAG_META[tag].icon;
        return (
          '<div class="insight-card tag-' + tag + '">' +
            '<div class="insight-title"><i data-lucide="' + icon + '" class="icon" style="width:14px;height:14px"></i>' + escapeHtml(insight.title) + "</div>" +
            '<div class="insight-content">' + escapeHtml(insight.content) + "</div>" +
          "</div>"
        );
      }

      function insightSummaryHtml(month, options) {
        const opts = options || {};
        const limit = opts.limit || 3;
        const items = insightsForMonth(month);
        const report = items.find(function (i) { return i.type === "report"; });
        const cards = items.filter(function (i) { return i.type === "card"; }).slice(0, limit);

        if (!report && !cards.length) {
          return (
            '<div class="card">' +
              '<div class="header" style="margin-bottom:0"><h3 class="card-title" style="margin:0">AI 洞察</h3>' +
              '<span class="insight-view-all" data-go-insights>前往產生 →</span></div>' +
              '<div class="insight-section-empty">本月尚無 AI 洞察，前往「AI範本」複製提示詞請 AI 產生。</div>' +
            "</div>"
          );
        }

        return (
          '<div class="card">' +
            '<div class="header" style="margin-bottom:10px"><h3 class="card-title" style="margin:0">AI 洞察</h3>' +
              '<span class="insight-view-all" data-go-insights>查看全部 →</span></div>' +
            (report ? '<p class="insight-report" style="margin-bottom:10px">' + escapeHtml(report.content.split("\n")[0]) + "</p>" : "") +
            '<div class="insight-grid">' + cards.map(insightCardHtml).join("") + "</div>" +
          "</div>"
        );
      }

      function bindInsightSummaryEvents(container) {
        container.querySelectorAll('[data-go-insights]').forEach(function (el) {
          el.addEventListener("click", function () {
            state.tab = "insights";
            render();
          });
        });
      }

      function renderInsights() {
        const month = state.insightsMonth;
        const items = insightsForMonth(month);
        const report = items.find(function (i) { return i.type === "report"; });
        const cards = items.filter(function (i) { return i.type === "card"; });

        const reportHtml = report
          ? '<div class="card"><h3 class="card-title">' + escapeHtml(report.title) + '</h3><p class="insight-report">' + escapeHtml(report.content) + "</p></div>"
          : "";

        const cardsHtml = cards.length
          ? '<div class="card"><h3 class="card-title">本月洞察小卡</h3><div class="insight-grid">' + cards.map(insightCardHtml).join("") + "</div></div>"
          : "";

        const emptyHtml = !report && !cards.length
          ? '<div class="card"><div class="empty-state"><i data-lucide="lightbulb" class="icon"></i><div>本月尚無 AI 洞察</div>' +
            '<button class="btn btn-primary" style="margin-top:12px" data-go-prompts>前往 AI範本</button></div></div>'
          : "";

        const html =
          '<div class="header"><h1>AI 洞察</h1><div class="sub">AI 寫入的本月報告與洞察小卡</div></div>' +
          '<div class="month-switch">' +
            '<button data-insights-delta="-1"><i data-lucide="chevron-left" class="icon"></i></button>' +
            '<span class="month-label">' + monthLabel(month) + "</span>" +
            '<button data-insights-delta="1"><i data-lucide="chevron-right" class="icon"></i></button>' +
          "</div>" +
          reportHtml + cardsHtml + emptyHtml;

        document.getElementById("page-insights").innerHTML = html;
        bindInsightsEvents();
        if (window.lucide) lucide.createIcons();
      }

      function bindInsightsEvents() {
        document.querySelectorAll('#page-insights [data-insights-delta]').forEach(function (el) {
          el.addEventListener("click", function () {
            state.insightsMonth = shiftMonth(state.insightsMonth, Number(el.getAttribute("data-insights-delta")));
            renderInsights();
          });
        });
        const goPrompts = document.querySelector('#page-insights [data-go-prompts]');
        if (goPrompts) goPrompts.addEventListener("click", function () {
          state.tab = "prompts";
          render();
        });
      }

      // ---------- AI 範本 ----------

      function promptText(template) {
        return String(template.prompt || "").split("{{SPREADSHEET_URL}}").join(DATA.spreadsheetUrl || "");
      }

      function renderPrompts() {
        const prompts = DATA.prompts || [];
        const cardsHtml = prompts.length
          ? prompts.map(function (template, index) {
              return (
                '<div class="card">' +
                  '<h3 class="card-title">' + escapeHtml(template.title) + "</h3>" +
                  '<pre style="white-space:pre-wrap;font-size:13px;font-family:inherit;margin:0 0 12px;color:var(--text-secondary)">' +
                    escapeHtml(promptText(template)) +
                  "</pre>" +
                  '<button class="btn btn-primary" data-copy-prompt="' + index + '"><i data-lucide="copy" class="icon" style="width:14px;height:14px"></i>複製範本</button>' +
                  '<span class="save-feedback" data-copy-feedback="' + index + '" style="margin-left:8px"></span>' +
                "</div>"
              );
            }).join("")
          : '<div class="empty-state">尚無範本</div>';

        const html =
          '<div class="header"><div><h1>AI 範本</h1><div class="sub">複製後貼到 ChatGPT 等 AI 工具使用</div></div></div>' +
          cardsHtml;

        document.getElementById("page-prompts").innerHTML = html;
        bindPromptsEvents(prompts);
        if (window.lucide) lucide.createIcons();
      }

      function bindPromptsEvents(prompts) {
        document.querySelectorAll('#page-prompts [data-copy-prompt]').forEach(function (el) {
          el.addEventListener("click", function () {
            const index = Number(el.getAttribute("data-copy-prompt"));
            const text = promptText(prompts[index]);
            const feedback = document.querySelector('[data-copy-feedback="' + index + '"]');
            const showOk = function () {
              if (!feedback) return;
              feedback.textContent = "✓ 已複製";
              feedback.className = "save-feedback ok";
              setTimeout(function () { feedback.textContent = ""; feedback.className = "save-feedback"; }, 2000);
            };
            const showError = function () {
              if (!feedback) return;
              feedback.textContent = "複製失敗，請手動選取";
              feedback.className = "save-feedback error";
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(text).then(showOk, showError);
            } else {
              try {
                const textarea = document.createElement("textarea");
                textarea.value = text;
                textarea.style.position = "fixed";
                textarea.style.opacity = "0";
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand("copy");
                document.body.removeChild(textarea);
                showOk();
              } catch (e) {
                showError();
              }
            }
          });
        });
      }

      // ---------- 設定 ----------

      function monthOptions() {
        const options = [];
        let cursor = "2024-01";
        while (cursor <= DATA.currentMonth) {
          options.push(cursor);
          cursor = shiftMonth(cursor, 1);
        }
        return options.reverse();
      }

      function getSyncHistory() {
        try {
          return JSON.parse(localStorage.getItem("syncHistory") || "[]");
        } catch (e) {
          return [];
        }
      }

      function addSyncHistory(entry) {
        const history = [entry].concat(getSyncHistory()).slice(0, 5);
        localStorage.setItem("syncHistory", JSON.stringify(history));
      }

      function renderSettings() {
        const months = monthOptions();
        const monthSelectHtml = function (selected) {
          return months.map(function (m) {
            return '<option value="' + m + '"' + (m === selected ? " selected" : "") + ">" + monthLabel(m) + "</option>";
          }).join("");
        };

        const syncHistory = getSyncHistory();
        const historyHtml = syncHistory.length
          ? syncHistory.map(function (entry) {
              return '<div class="sync-history-row"><span>' + escapeHtml(entry.at) + " · " + escapeHtml(entry.range) + "</span><span>" + escapeHtml(entry.result) + "</span></div>";
            }).join("")
          : '<div style="font-size:12px;color:var(--text-secondary)">尚無同步紀錄</div>';

        const resultHtml = state.syncResult
          ? '<div class="result-banner ' + state.syncResult.kind + '">' + escapeHtml(state.syncResult.text) + "</div>"
          : "";

        const exportErrorHtml = state.exportError
          ? '<div class="result-banner error">' + escapeHtml(state.exportError) + "</div>"
          : "";

        const html =
          '<div class="header"><h1>設定</h1></div>' +

          '<div class="card">' +
            '<h3 class="section-title">發票同步</h3>' +
            '<div class="edit-grid">' +
              '<div><span class="field-label">起始月份</span><select class="field" id="syncStart">' + monthSelectHtml(DATA.currentMonth) + "</select></div>" +
              '<div><span class="field-label">結束月份</span><select class="field" id="syncEnd">' + monthSelectHtml(DATA.currentMonth) + "</select></div>" +
            "</div>" +
            '<button class="btn btn-primary btn-block" id="syncBtn" ' + (state.syncing ? "disabled" : "") + ">" +
              (state.syncing ? "同步中..." : "同步發票") +
            "</button>" +
            resultHtml +
          "</div>" +

          '<div class="card">' +
            '<h3 class="section-title">同步紀錄</h3>' + historyHtml +
          "</div>" +

          '<div class="card">' +
            '<h3 class="section-title">匯出資料</h3>' +
            '<div class="edit-grid">' +
              '<div><span class="field-label">起始月份</span><select class="field" id="exportStart">' + monthSelectHtml(DATA.currentMonth) + "</select></div>" +
              '<div><span class="field-label">結束月份</span><select class="field" id="exportEnd">' + monthSelectHtml(DATA.currentMonth) + "</select></div>" +
            "</div>" +
            '<div class="toggle-group">' +
              '<div class="chip' + (state.exportFormat === "csv" ? " active" : "") + '" data-format="csv">CSV</div>' +
              '<div class="chip' + (state.exportFormat === "json" ? " active" : "") + '" data-format="json">JSON</div>' +
            "</div>" +
            '<button class="btn btn-primary btn-block" id="exportBtn" ' + (state.exporting ? "disabled" : "") + ">" +
              (state.exporting ? "準備中..." : "匯出") +
            "</button>" +
            exportErrorHtml +
          "</div>" +

          '<div class="card">' +
            '<div class="app-info-row"><span>最後同步</span><span>' + escapeHtml((DATA.lastSyncedAt || "").replace("T", " ")) + "</span></div>" +
            '<div class="app-info-row"><span>資料來源</span><span>財政部電子發票</span></div>' +
          "</div>";

        document.getElementById("page-settings").innerHTML = html;
        bindSettingsEvents();
        if (window.lucide) lucide.createIcons();
      }

      function bindSettingsEvents() {
        const syncBtn = document.getElementById("syncBtn");
        if (syncBtn) syncBtn.addEventListener("click", function () {
          const startMonth = document.getElementById("syncStart").value;
          const endMonth = document.getElementById("syncEnd").value;
          state.syncing = true;
          state.syncResult = null;
          renderSettings();

          google.script.run
            .withSuccessHandler(function (result) {
              state.syncing = false;
              const text = result.invoices > 0
                ? "✓ 成功同步 " + result.invoices + " 張發票（" + monthLabel(result.startMonth) + " 至 " + monthLabel(result.endMonth) + "）"
                : "已是最新，無需同步";
              state.syncResult = { kind: result.invoices > 0 ? "success" : "neutral", text: text };
              addSyncHistory({
                at: new Date().toLocaleString("zh-TW"),
                range: monthLabel(startMonth) + " 至 " + monthLabel(endMonth),
                result: result.invoices > 0 ? "新增 " + result.invoices + " 張" : "已是最新",
              });
              renderSettings();
              google.script.run.withSuccessHandler(function (data) {
                Object.assign(DATA, data);
                render();
              }).getPageData();
            })
            .withFailureHandler(function (error) {
              state.syncing = false;
              state.syncResult = { kind: "error", text: error.message || String(error) };
              addSyncHistory({
                at: new Date().toLocaleString("zh-TW"),
                range: monthLabel(startMonth) + " 至 " + monthLabel(endMonth),
                result: "失敗",
              });
              renderSettings();
            })
            .syncInvoices({ startMonth: startMonth, endMonth: endMonth });
        });

        document.querySelectorAll('#page-settings [data-format]').forEach(function (el) {
          el.addEventListener("click", function () {
            state.exportFormat = el.getAttribute("data-format");
            renderSettings();
          });
        });

        const exportBtn = document.getElementById("exportBtn");
        if (exportBtn) exportBtn.addEventListener("click", function () {
          const startMonth = document.getElementById("exportStart").value;
          const endMonth = document.getElementById("exportEnd").value;
          state.exporting = true;
          state.exportError = "";
          renderSettings();

          google.script.run
            .withSuccessHandler(function (result) {
              state.exporting = false;
              renderSettings();
              const mime = state.exportFormat === "json" ? "application/json" : "text/csv";
              const blob = new Blob([result.data], { type: mime });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = result.filename;
              a.click();
              URL.revokeObjectURL(url);
            })
            .withFailureHandler(function (error) {
              state.exporting = false;
              state.exportError = error.message || String(error);
              renderSettings();
            })
            .exportData({ startMonth: startMonth, endMonth: endMonth, format: state.exportFormat });
        });
      }

      render();
    </script>
  </body>
</html>
